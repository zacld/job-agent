name: Run Job Agent

on:
  schedule:
    # 8:00 AM UTC, Monday–Friday
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no form fills or emails)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      use_linkedin:
        description: 'Enable LinkedIn scraping?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      skip_search:
        description: 'Skip search, only process existing sheet jobs?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Decode Google service account credentials
        run: echo "$GOOGLE_CREDENTIALS_JSON" | base64 --decode > credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Run job agent
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}"     = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ github.event.inputs.use_linkedin }}" = "true" ] && ARGS="$ARGS --linkedin"
          [ "${{ github.event.inputs.skip_search }}"  = "true" ] && ARGS="$ARGS --skip-search"
          python main.py $ARGS
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY:           ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID:            ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          MY_EMAIL:                 ${{ secrets.MY_EMAIL }}
          LINKEDIN_EMAIL:           ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:        ${{ secrets.LINKEDIN_PASSWORD }}
          CI:                       "true"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload cover letters
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-letters-${{ github.run_number }}
          path: output/cover_letters/
          if-no-files-found: ignore
          retention-days: 30

      - name: Save run summary to logs branch
        if: always()
        run: |
          git config user.name  "job-agent[bot]"
          git config user.email "job-agent@users.noreply.github.com"
          mkdir -p logs
          echo "{\"run\": ${{ github.run_number }}, \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > logs/run_${{ github.run_number }}.json
          git fetch origin logs 2>/dev/null || git checkout --orphan logs
          git checkout logs 2>/dev/null || true
          git add logs/
          git diff --cached --quiet || git commit -m "Run summary #${{ github.run_number }}"
          git push origin logs
        continue-on-error: true
